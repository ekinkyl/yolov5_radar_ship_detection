# X-band radar hyperparams (complete set)
lr0: 0.005 # initial LR (for total batch = 32)
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Loss balance
box: 0.05
obj: 1.2
cls: 0.5
cls_pw: 1.0
obj_pw: 1.0

# Assignment
iou_t: 0.25
anchor_t: 4.0

# Focal loss
fl_gamma: 0.0

# Color aug (minimal for radar)
#hsv_h: 0.0
#hsv_s: 0.10
#hsv_v: 0.10

# for 3 frame
hsv_h: 0.0
hsv_s: 0.0
hsv_v: 0.0

# Geometric aug
degrees: 2.0
translate: 0.10
scale: 0.80
shear: 0.10
perspective: 0.0
flipud: 0.0
fliplr: 0.5

# Mixing aug
mosaic: 0.70
mixup: 0.05
copy_paste: 0.0
# α-DIoU Loss
#iou_type: adiou      # options: ciou, diou, giou, iou, adiou
#alpha_iou: 0.5     # α in (0, +∞); try 0.3–0.7 for small ships
